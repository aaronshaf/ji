name: Scheduled Quality Check

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggers

jobs:
  quality-audit:
    name: Weekly Quality Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run comprehensive audit
      run: |
        echo "# 📊 Weekly Code Quality Audit" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Generated on: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # TypeScript
        echo "## TypeScript Check" >> $GITHUB_STEP_SUMMARY
        if bun run typecheck 2>&1 | tee typecheck.log; then
          echo "✅ **Status**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status**: Failed" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat typecheck.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Code Statistics
        echo "## Code Statistics" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| TypeScript files | $(find src -name "*.ts" -not -path "*/node_modules/*" | wc -l) |" >> $GITHUB_STEP_SUMMARY
        echo "| Total lines | $(find src -name "*.ts" -not -path "*/node_modules/*" -exec cat {} \; | wc -l) |" >> $GITHUB_STEP_SUMMARY
        echo "| TODO comments | $(grep -r "TODO" src --include="*.ts" | wc -l) |" >> $GITHUB_STEP_SUMMARY
        echo "| FIXME comments | $(grep -r "FIXME" src --include="*.ts" | wc -l) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Biome Analysis
        echo "## Biome Analysis" >> $GITHUB_STEP_SUMMARY
        bun run biome check . --formatter=json 2>&1 > biome.json || true
        
        if [ -s biome.json ] && [ "$(cat biome.json | jq -r '.diagnostics | length' 2>/dev/null || echo "0")" = "0" ]; then
          echo "✅ **Status**: Clean (0 warnings, 0 errors)" >> $GITHUB_STEP_SUMMARY
        else
          WARNINGS=$(cat biome.json | jq -r '[.diagnostics[] | select(.severity == "warning")] | length' 2>/dev/null || echo "0")
          ERRORS=$(cat biome.json | jq -r '[.diagnostics[] | select(.severity == "error")] | length' 2>/dev/null || echo "0")
          
          if [ "$WARNINGS" = "0" ] && [ "$ERRORS" = "0" ]; then
            echo "✅ **Status**: Clean (0 warnings, 0 errors)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status**: Issues found" >> $GITHUB_STEP_SUMMARY
            echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "- Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Dependencies
        echo "## Dependencies" >> $GITHUB_STEP_SUMMARY
        echo "| Type | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Dependencies | $(cat package.json | jq '.dependencies | length' 2>/dev/null || echo "0") |" >> $GITHUB_STEP_SUMMARY
        echo "| Dev Dependencies | $(cat package.json | jq '.devDependencies | length' 2>/dev/null || echo "0") |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Final Summary
        echo "## Summary" >> $GITHUB_STEP_SUMMARY
        echo "This audit runs weekly to ensure code quality standards are maintained." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Quality Policy**: Zero warnings tolerance" >> $GITHUB_STEP_SUMMARY

    - name: Create issue if quality degraded
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const title = 'Code Quality Audit Failed';
          const body = `The weekly code quality audit has detected issues that need attention.
          
          Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.
          
          This is an automated issue created by the scheduled quality check workflow.`;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['quality', 'automated']
          });